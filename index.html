<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Responsive Custom Ping Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            overflow-y: auto;
        }

        h1 {
            font-size: calc(1.5rem + 1vw); /* Scales title size relative to device width */
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Menu & Setup Section */
        .menu-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-size: 1rem;
            color: #38bdf8;
            border-bottom: 2px solid #334155;
            padding-bottom: 5px;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
        }

        input[type="text"], select {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-size: 0.9rem;
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: #38bdf8;
        }

        .color-inputs {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap; /* Wraps items cleanly on extra narrow phone screens */
        }

        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 60px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #475569;
            border-radius: 6px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #38bdf8;
        }

        /* Buttons */
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
            width: 100%;
        }

        .btn:hover {
            background-color: #0ea5e9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #475569;
            color: #f8fafc;
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        /* Responsive Game Display Section */
        #game-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 800px;
        }

        .canvas-container {
            width: 100%;
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100%; /* Dynamically scales the canvas width to fit the screen */
            height: auto; /* Scales height while keeping original proportion */
            touch-action: none; /* Disables default zoom/scroll gestures during gameplay */
        }

        .controls-info {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            max-width: 100%;
            line-height: 1.4;
            padding: 0 10px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 500px) {
            .form-grid {
                grid-template-columns: 1fr; /* Stacks layout elements vertically on smartphones */
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .menu-card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="setup-section">
        <h1>Custom Pong</h1>
        <div class="menu-card">
            
            <div class="section-title">Game Options</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="game-mode">Game Mode</label>
                    <select id="game-mode">
                        <option value="1">1 Player (vs AI)</option>
                        <option value="2">2 Players (Local)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="theme-select">Visual Theme</label>
                    <select id="theme-select">
                        <option value="classic">Classic Retro</option>
                        <option value="neon">Neon Nights</option>
                        <option value="forest">Forest Moss</option>
                        <option value="cyberpunk">Cyberpunk Grid</option>
                        <option value="custom">Custom Palette</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="p1-name">Player 1 Name</label>
                    <input type="text" id="p1-name" value="Player 1" maxlength="12">
                </div>
                <div class="form-group" id="p2-name-group">
                    <label for="p2-name" id="p2-label">Player 2 Name</label>
                    <input type="text" id="p2-name" value="CPU" maxlength="12">
                </div>
            </div>

            <div class="section-title">Ball Customization</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="ball-shape">Ball Shape</label>
                    <select id="ball-shape">
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ball-size">Ball Size</label>
                    <div class="slider-container">
                        <input type="range" id="ball-size" min="6" max="24" value="10">
                        <span id="size-val">10px</span>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Colors</label>
                    <div class="color-inputs">
                        <div class="color-item">
                            <span style="font-size:0.7rem; color:#94a3b8; margin-bottom:4px;">Ball</span>
                            <input type="color" id="ball-color" value="#ffffff">
                        </div>
                        <div class="color-item">
                            <span style="font-size:0.7rem; color:#94a3b8; margin-bottom:4px;">P1 Color</span>
                            <input type="color" id="p1-color" value="#38bdf8">
                        </div>
                        <div class="color-item">
                            <span style="font-size:0.7rem; color:#94a3b8; margin-bottom:4px;">P2 Color</span>
                            <input type="color" id="p2-color" value="#f43f5e">
                        </div>
                        <div class="color-item">
                            <span style="font-size:0.7rem; color:#94a3b8; margin-bottom:4px;">Background</span>
                            <input type="color" id="bg-color" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn" id="start-btn">Start Game</button>
        </div>
    </div>

    <div id="game-section">
        <h1 id="game-title">PING PONG</h1>
        <div class="canvas-container">
            <canvas id="pong" width="800" height="400"></canvas>
        </div>
        <div class="controls-info" id="controls-text">
            Player 1: Touch & Drag or W/S keys.<br>
            Player 2: Moves automatically.
        </div>
        <button class="btn btn-secondary" id="menu-btn">Back to Settings</button>
    </div>

    <script>
        // DOM Elements
        const setupSection = document.getElementById("setup-section");
        const gameSection = document.getElementById("game-section");
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        const gameModeSelect = document.getElementById("game-mode");
        const themeSelect = document.getElementById("theme-select");
        const p1NameInput = document.getElementById("p1-name");
        const p2NameInput = document.getElementById("p2-name");
        const p2NameGroup = document.getElementById("p2-name-group");
        const p2Label = document.getElementById("p2-label");
        const ballShapeSelect = document.getElementById("ball-shape");
        const ballSizeInput = document.getElementById("ball-size");
        const sizeValLabel = document.getElementById("size-val");
        
        const ballColorInput = document.getElementById("ball-color");
        const p1ColorInput = document.getElementById("p1-color");
        const p2ColorInput = document.getElementById("p2-color");
        const bgColorInput = document.getElementById("bg-color");

        const startBtn = document.getElementById("start-btn");
        const menuBtn = document.getElementById("menu-btn");
        const controlsText = document.getElementById("controls-text");

        // Game Variables
        let gameRunning = false;
        let animationFrameId;
        const keysPressed = {};
        const paddleSpeed = 8;
        const initialBallSpeed = 5;

        const themes = {
            classic: { bg: "#000000", p1: "#ffffff", p2: "#ffffff", ball: "#ffffff" },
            neon: { bg: "#0f051d", p1: "#00f0ff", p2: "#ff007f", ball: "#ffff00" },
            forest: { bg: "#0c2310", p1: "#d4af37", p2: "#8b5a2b", ball: "#f5f5dc" },
            cyberpunk: { bg: "#111827", p1: "#f43f5e", p2: "#10b981", ball: "#facc15" }
        };

        const config = {
            mode: 1,
            p1Name: "Player 1",
            p2Name: "CPU",
            ballShape: "circle",
            ballSize: 10,
            colors: { bg: "#000000", p1: "#ffffff", p2: "#ffffff", ball: "#ffffff", border: "#ffffff" }
        };

        const paddleWidth = 12;
        const paddleHeight = 100;

        const p1 = { x: 10, y: 0, width: paddleWidth, height: paddleHeight, score: 0, color: "" };
        const p2 = { x: 0, y: 0, width: paddleWidth, height: paddleHeight, score: 0, color: "" };
        const ball = { x: 0, y: 0, radius: 10, speed: initialBallSpeed, velocityX: initialBallSpeed, velocityY: initialBallSpeed, color: "", shape: "circle" };

        // Setup Panel Listeners
        gameModeSelect.addEventListener("change", (e) => {
            if (e.target.value === "1") {
                p2Label.innerText = "Player 2 Name";
                p2NameInput.value = "CPU";
                p2NameInput.disabled = true;
            } else {
                p2Label.innerText = "Player 2 Name";
                if (p2NameInput.value === "CPU") p2NameInput.value = "Player 2";
                p2NameInput.disabled = false;
            }
        });

        ballSizeInput.addEventListener("input", (e) => {
            sizeValLabel.innerText = e.target.value + "px";
        });

        themeSelect.addEventListener("change", (e) => {
            applyThemePreset(e.target.value);
        });

        [ballColorInput, p1ColorInput, p2ColorInput, bgColorInput].forEach(elem => {
            elem.addEventListener("input", () => { themeSelect.value = "custom"; });
        });

        function applyThemePreset(themeKey) {
            if (themeKey === "custom") return;
            const theme = themes[themeKey];
            bgColorInput.value = theme.bg;
            p1ColorInput.value = theme.p1;
            p2ColorInput.value = theme.p2;
            ballColorInput.value = theme.ball;
        }

        applyThemePreset("classic");
        p2NameInput.disabled = true;

        // Desktop Controls: Keyboard Tracking
        window.addEventListener("keydown", (e) => { keysPressed[e.code] = true; });
        window.addEventListener("keyup", (e) => { keysPressed[e.code] = false; });

        // Desktop Controls: Mouse Tracking
        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            let relativeY = e.clientY - rect.top;
            let scaleY = canvas.height / rect.height; // Maps relative coordinates back to internal resolution (800x400)
            p1.y = (relativeY * scaleY) - p1.height / 2;
        });

        // Mobile/Tablet Controls: Touch Screen Event Handler (Supports Multi-touch)
        function handleTouch(e) {
            e.preventDefault(); // Prevents web page bouncing/zooming gestures
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;

            for (let i = 0; i < e.touches.length; i++) {
                let touch = e.touches[i];
                let relativeX = touch.clientX - rect.left;
                let relativeY = touch.clientY - rect.top;

                let canvasX = relativeX * scaleX;
                let canvasY = relativeY * scaleY;

                if (config.mode === 1) {
                    // Single Player Mode: Any touch controls the left paddle
                    p1.y = canvasY - p1.height / 2;
                } else {
                    // Multi Player Mode: Split screen touch
                    if (canvasX < canvas.width / 2) {
                        p1.y = canvasY - p1.height / 2; // Left side touch -> Player 1
                    } else {
                        p2.y = canvasY - p2.height / 2; // Right side touch -> Player 2
                    }
                }
            }
        }

        canvas.addEventListener("touchstart", handleTouch, { passive: false });
        canvas.addEventListener("touchmove", handleTouch, { passive: false });

        // Initialize and Run
        startBtn.addEventListener("click", () => {
            config.mode = parseInt(gameModeSelect.value);
            config.p1Name = p1NameInput.value.trim() || "Player 1";
            config.p2Name = p2NameInput.value.trim() || (config.mode === 1 ? "CPU" : "Player 2");
            config.ballShape = ballShapeSelect.value;
            config.ballSize = parseInt(ballSizeInput.value);

            config.colors.bg = bgColorInput.value;
            config.colors.p1 = p1ColorInput.value;
            config.colors.p2 = p2ColorInput.value;
            config.colors.ball = ballColorInput.value;
            config.colors.border = p1ColorInput.value;

            document.querySelector(".canvas-container").style.borderColor = config.colors.border;

            if (config.mode === 1) {
                controlsText.innerHTML = `<strong>${config.p1Name}</strong>: Drag on screen, use Mouse, or W/S keys.<br><strong>${config.p2Name}</strong> is auto-controlled.`;
            } else {
                controlsText.innerHTML = `<strong>${config.p1Name}</strong>: Drag left screen side / W-S keys.<br><strong>${config.p2Name}</strong>: Drag right screen side / Up-Down arrows.`;
            }

            p1.y = canvas.height / 2 - paddleHeight / 2;
            p1.score = 0;
            p1.color = config.colors.p1;

            p2.x = canvas.width - paddleWidth - 10;
            p2.y = canvas.height / 2 - paddleHeight / 2;
            p2.score = 0;
            p2.color = config.colors.p2;

            ball.radius = config.ballSize;
            ball.shape = config.ballShape;
            ball.color = config.colors.ball;
            resetBall();

            setupSection.style.display = "none";
            gameSection.style.display = "flex";

            gameRunning = true;
            gameLoop();
        });

        menuBtn.addEventListener("click", () => {
            gameRunning = false;
            cancelAnimationFrame(animationFrameId);
            gameSection.style.display = "none";
            setupSection.style.display = "block";
        });

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = initialBallSpeed;
            ball.velocityX = (Math.random() > 0.5 ? 1 : -1) * initialBallSpeed;
            ball.velocityY = (Math.random() > 0.5 ? 1 : -1) * (initialBallSpeed - 1);
        }

        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        function update() {
            // Keyboard Movement checks (desktop fallback)
            if (keysPressed["KeyW"] || keysPressed["Keyw"]) p1.y -= paddleSpeed;
            if (keysPressed["KeyS"] || keysPressed["Keys"]) p1.y += paddleSpeed;

            if (p1.y < 0) p1.y = 0;
            if (p1.y + p1.height > canvas.height) p1.y = canvas.height - p1.height;

            if (config.mode === 1) {
                let targetY = ball.y - (p2.height / 2);
                p2.y += (targetY - p2.y) * 0.08;
            } else {
                if (keysPressed["ArrowUp"]) p2.y -= paddleSpeed;
                if (keysPressed["ArrowDown"]) p2.y += paddleSpeed;
            }

            if (p2.y < 0) p2.y = 0;
            if (p2.y + p2.height > canvas.height) p2.y = canvas.height - p2.height;

            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.velocityY = -ball.velocityY;
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.velocityY = -ball.velocityY;
            }

            let activePaddle = (ball.x < canvas.width / 2) ? p1 : p2;

            if (collision(ball, activePaddle)) {
                let collidePoint = ball.y - (activePaddle.y + activePaddle.height / 2);
                collidePoint = collidePoint / (activePaddle.height / 2);

                let angleRad = (Math.PI / 4) * collidePoint;
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);
                ball.speed += 0.35;
            }

            if (ball.x - ball.radius < 0) {
                p2.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                p1.score++;
                resetBall();
            }
        }

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawBall(x, y, r, color, shape) {
            ctx.fillStyle = color;
            if (shape === "square") {
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            } else {
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2, false);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawNet() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawHUD() {
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.font = "20px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            
            ctx.fillText(config.p1Name, canvas.width / 4, 40);
            ctx.font = "bold 45px 'Segoe UI', sans-serif";
            ctx.fillText(p1.score, canvas.width / 4, 90);

            ctx.font = "20px 'Segoe UI', sans-serif";
            ctx.fillText(config.p2Name, (3 * canvas.width) / 4, 40);
            ctx.font = "bold 45px 'Segoe UI', sans-serif";
            ctx.fillText(p2.score, (3 * canvas.width) / 4, 90);
        }

        function render() {
            drawRect(0, 0, canvas.width, canvas.height, config.colors.bg);
            drawNet();
            drawHUD();
            drawRect(p1.x, p1.y, p1.width, p1.height, p1.color);
            drawRect(p2.x, p2.y, p2.width, p2.height, p2.color);
            drawBall(ball.x, ball.y, ball.radius, ball.color, ball.shape);
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            render();
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
