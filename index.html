<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customizable Ping Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Menu & Setup Section */
        .menu-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            color: #38bdf8;
            border-bottom: 2px solid #334155;
            padding-bottom: 5px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
        }

        input[type="text"], select {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: #38bdf8;
        }

        .color-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #475569;
            border-radius: 6px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #38bdf8;
        }

        /* Buttons */
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }

        .btn:hover {
            background-color: #0ea5e9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #475569;
            color: #f8fafc;
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        /* Game Display Section */
        #game-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .canvas-container {
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        .controls-info {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.4;
        }

        /* Utility classes */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="setup-section">
        <h1>Pong Customization</h1>
        <div class="menu-card">
            
            <div class="section-title">Game Options</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="game-mode">Game Mode</label>
                    <select id="game-mode">
                        <option value="1">1 Player (vs AI)</option>
                        <option value="2">2 Players (Local)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="theme-select">Visual Theme</label>
                    <select id="theme-select">
                        <option value="classic">Classic Retro</option>
                        <option value="neon">Neon Nights</option>
                        <option value="forest">Forest Moss</option>
                        <option value="cyberpunk">Cyberpunk Grid</option>
                        <option value="custom">Custom Palette</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="p1-name">Player 1 Name</label>
                    <input type="text" id="p1-name" value="Player 1" maxlength="12">
                </div>
                <div class="form-group" id="p2-name-group">
                    <label for="p2-name" id="p2-label">Player 2 Name</label>
                    <input type="text" id="p2-name" value="CPU" maxlength="12">
                </div>
            </div>

            <div class="section-title">Ball Customization</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="ball-shape">Ball Shape</label>
                    <select id="ball-shape">
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ball-size">Ball Size</label>
                    <div class="slider-container">
                        <input type="range" id="ball-size" min="6" max="24" value="10">
                        <span id="size-val">10px</span>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Colors</label>
                    <div class="color-inputs">
                        <div class="form-group" style="align-items: center;">
                            <span style="font-size:0.75rem; color:#94a3b8;">Ball</span>
                            <input type="color" id="ball-color" value="#ffffff">
                        </div>
                        <div class="form-group custom-color-ctrl" style="align-items: center;">
                            <span style="font-size:0.75rem; color:#94a3b8;">P1 Color</span>
                            <input type="color" id="p1-color" value="#38bdf8">
                        </div>
                        <div class="form-group custom-color-ctrl" style="align-items: center;">
                            <span style="font-size:0.75rem; color:#94a3b8;">P2 Color</span>
                            <input type="color" id="p2-color" value="#f43f5e">
                        </div>
                        <div class="form-group custom-color-ctrl" style="align-items: center;">
                            <span style="font-size:0.75rem; color:#94a3b8;">Background</span>
                            <input type="color" id="bg-color" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn" id="start-btn">Start Game</button>
        </div>
    </div>

    <div id="game-section">
        <h1 id="game-title">PING PONG</h1>
        <div class="canvas-container">
            <canvas id="pong" width="800" height="400"></canvas>
        </div>
        <div class="controls-info" id="controls-text">
            Player 1: Mouse movement or W/S keys.<br>
            Player 2 (AI): Moves automatically.
        </div>
        <button class="btn btn-secondary" id="menu-btn">Back to Settings</button>
    </div>

    <script>
        // DOM Elements
        const setupSection = document.getElementById("setup-section");
        const gameSection = document.getElementById("game-section");
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        const gameModeSelect = document.getElementById("game-mode");
        const themeSelect = document.getElementById("theme-select");
        const p1NameInput = document.getElementById("p1-name");
        const p2NameInput = document.getElementById("p2-name");
        const p2NameGroup = document.getElementById("p2-name-group");
        const p2Label = document.getElementById("p2-label");
        const ballShapeSelect = document.getElementById("ball-shape");
        const ballSizeInput = document.getElementById("ball-size");
        const sizeValLabel = document.getElementById("size-val");
        
        // Custom Color Controllers
        const ballColorInput = document.getElementById("ball-color");
        const p1ColorInput = document.getElementById("p1-color");
        const p2ColorInput = document.getElementById("p2-color");
        const bgColorInput = document.getElementById("bg-color");

        const startBtn = document.getElementById("start-btn");
        const menuBtn = document.getElementById("menu-btn");
        const controlsText = document.getElementById("controls-text");

        // Game State & Configuration Variables
        let gameRunning = false;
        let animationFrameId;
        const keysPressed = {};
        const paddleSpeed = 7;
        const initialBallSpeed = 5;

        // Visual Theme Templates
        const themes = {
            classic: {
                bg: "#000000",
                p1: "#ffffff",
                p2: "#ffffff",
                ball: "#ffffff",
                border: "#ffffff"
            },
            neon: {
                bg: "#0f051d",
                p1: "#00f0ff",
                p2: "#ff007f",
                ball: "#ffff00",
                border: "#00f0ff"
            },
            forest: {
                bg: "#0c2310",
                p1: "#d4af37",
                p2: "#8b5a2b",
                ball: "#f5f5dc",
                border: "#d4af37"
            },
            cyberpunk: {
                bg: "#111827",
                p1: "#f43f5e",
                p2: "#10b981",
                ball: "#facc15",
                border: "#4b5563"
            }
        };

        // Game Settings Payload
        const config = {
            mode: 1, // 1 or 2 players
            theme: "classic",
            p1Name: "Player 1",
            p2Name: "CPU",
            ballShape: "circle",
            ballSize: 10,
            colors: {
                bg: "#000000",
                p1: "#ffffff",
                p2: "#ffffff",
                ball: "#ffffff",
                border: "#ffffff"
            }
        };

        // Standard Game Entities
        const paddleWidth = 12;
        const paddleHeight = 100;

        const p1 = {
            x: 10,
            y: 0,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            color: ""
        };

        const p2 = {
            x: 0,
            y: 0,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            color: ""
        };

        const ball = {
            x: 0,
            y: 0,
            radius: 10,
            speed: initialBallSpeed,
            velocityX: initialBallSpeed,
            velocityY: initialBallSpeed,
            color: "",
            shape: "circle"
        };

        // Menu Event Listeners
        gameModeSelect.addEventListener("change", (e) => {
            if (e.target.value === "1") {
                p2Label.innerText = "Player 2 Name";
                p2NameInput.value = "CPU";
                p2NameInput.disabled = true;
            } else {
                p2Label.innerText = "Player 2 Name";
                if (p2NameInput.value === "CPU") p2NameInput.value = "Player 2";
                p2NameInput.disabled = false;
            }
        });

        ballSizeInput.addEventListener("input", (e) => {
            sizeValLabel.innerText = e.target.value + "px";
        });

        themeSelect.addEventListener("change", (e) => {
            applyThemePreset(e.target.value);
        });

        // Event listener helpers to force UI into 'custom' mode if user manually updates color inputs
        [ballColorInput, p1ColorInput, p2ColorInput, bgColorInput].forEach(elem => {
            elem.addEventListener("input", () => {
                themeSelect.value = "custom";
            });
        });

        function applyThemePreset(themeKey) {
            if (themeKey === "custom") return;
            const theme = themes[themeKey];
            bgColorInput.value = theme.bg;
            p1ColorInput.value = theme.p1;
            p2ColorInput.value = theme.p2;
            ballColorInput.value = theme.ball;
        }

        // Initialize theme UI elements on load
        applyThemePreset("classic");
        p2NameInput.disabled = true; // Start in 1-player mode

        // Controls Keyboard Tracking
        window.addEventListener("keydown", (e) => {
            keysPressed[e.code] = true;
        });

        window.addEventListener("keyup", (e) => {
            keysPressed[e.code] = false;
        });

        // P1 Mouse Tracking
        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            p1.y = e.clientY - rect.top - p1.height / 2;
        });

        // Initialize parameters and start game loop
        startBtn.addEventListener("click", () => {
            // Apply configurations
            config.mode = parseInt(gameModeSelect.value);
            config.p1Name = p1NameInput.value.trim() || "Player 1";
            config.p2Name = p2NameInput.value.trim() || (config.mode === 1 ? "CPU" : "Player 2");
            config.ballShape = ballShapeSelect.value;
            config.ballSize = parseInt(ballSizeInput.value);

            config.colors.bg = bgColorInput.value;
            config.colors.p1 = p1ColorInput.value;
            config.colors.p2 = p2ColorInput.value;
            config.colors.ball = ballColorInput.value;
            // Border matches either the player 1 theme choice or white
            config.colors.border = p1ColorInput.value;

            // Set dynamic canvas border style
            document.querySelector(".canvas-container").style.borderColor = config.colors.border;

            // Setup instruction panel text
            if (config.mode === 1) {
                controlsText.innerHTML = `<strong>${config.p1Name}</strong>: Use your Mouse or W/S keys to move.<br><strong>${config.p2Name}</strong> is automated.`;
            } else {
                controlsText.innerHTML = `<strong>${config.p1Name}</strong>: Use W/S keys.<br><strong>${config.p2Name}</strong>: Use Up/Down Arrow keys.`;
            }

            // Setup entity values
            p1.y = canvas.height / 2 - paddleHeight / 2;
            p1.score = 0;
            p1.color = config.colors.p1;

            p2.x = canvas.width - paddleWidth - 10;
            p2.y = canvas.height / 2 - paddleHeight / 2;
            p2.score = 0;
            p2.color = config.colors.p2;

            ball.radius = config.ballSize;
            ball.shape = config.ballShape;
            ball.color = config.colors.ball;
            resetBall();

            // Toggle screens
            setupSection.style.display = "none";
            gameSection.style.display = "flex";

            gameRunning = true;
            gameLoop();
        });

        menuBtn.addEventListener("click", () => {
            gameRunning = false;
            cancelAnimationFrame(animationFrameId);
            gameSection.style.display = "none";
            setupSection.style.display = "block";
        });

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = initialBallSpeed;
            // Reverse direction towards the scoring player
            ball.velocityX = (Math.random() > 0.5 ? 1 : -1) * initialBallSpeed;
            ball.velocityY = (Math.random() > 0.5 ? 1 : -1) * (initialBallSpeed - 1);
        }

        // Standard bounding box intersection formula
        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        // Logic Engine Update Frame
        function update() {
            // Player 1 input checks (W / S keys)
            if (keysPressed["KeyW"] || keysPressed["Keyw"]) {
                p1.y -= paddleSpeed;
            }
            if (keysPressed["KeyS"] || keysPressed["Keys"]) {
                p1.y += paddleSpeed;
            }
            // Retain paddle 1 boundary clip
            if (p1.y < 0) p1.y = 0;
            if (p1.y + p1.height > canvas.height) p1.y = canvas.height - p1.height;

            // Player 2 controls mapping (AI vs Human)
            if (config.mode === 1) {
                // AI behavior
                let targetY = ball.y - (p2.height / 2);
                p2.y += (targetY - p2.y) * 0.08; // 0.08 acts as the AI delay threshold
            } else {
                // Human 2 keyboard mapping
                if (keysPressed["ArrowUp"]) {
                    p2.y -= paddleSpeed;
                }
                if (keysPressed["ArrowDown"]) {
                    p2.y += paddleSpeed;
                }
            }
            // Retain paddle 2 boundary clip
            if (p2.y < 0) p2.y = 0;
            if (p2.y + p2.height > canvas.height) p2.y = canvas.height - p2.height;

            // Track ball displacement
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Edge bounce logic top and bottom walls
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius; // Clip positioning to prevent overlap bugs
                ball.velocityY = -ball.velocityY;
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.velocityY = -ball.velocityY;
            }

            // Paddle selection check
            let activePaddle = (ball.x < canvas.width / 2) ? p1 : p2;

            if (collision(ball, activePaddle)) {
                // Determine collision center offset
                let collidePoint = ball.y - (activePaddle.y + activePaddle.height / 2);
                // Normalized coordinate conversion (-1 to 1)
                collidePoint = collidePoint / (activePaddle.height / 2);

                // Math.PI/4 determines peak bounce trajectory angle (45 degrees max)
                let angleRad = (Math.PI / 4) * collidePoint;
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                // Slightly speed up game velocity per bounce to scale difficulty
                ball.speed += 0.35;
            }

            // Point tracker updates
            if (ball.x - ball.radius < 0) {
                p2.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                p1.score++;
                resetBall();
            }
        }

        // Draw Rect Utility
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        // Dynamic Shape Handler
        function drawBall(x, y, r, color, shape) {
            ctx.fillStyle = color;
            if (shape === "square") {
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            } else {
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2, false);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Draw Line Matrix
        function drawNet() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Dynamic Scoreboard & Overhead Name Tag Render
        function drawHUD() {
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.font = "20px 'Segoe UI', sans-serif";
            
            // Left Score details
            ctx.textAlign = "center";
            ctx.fillText(config.p1Name, canvas.width / 4, 40);
            ctx.font = "bold 45px 'Segoe UI', sans-serif";
            ctx.fillText(p1.score, canvas.width / 4, 90);

            // Right Score details
            ctx.font = "20px 'Segoe UI', sans-serif";
            ctx.fillText(config.p2Name, (3 * canvas.width) / 4, 40);
            ctx.font = "bold 45px 'Segoe UI', sans-serif";
            ctx.fillText(p2.score, (3 * canvas.width) / 4, 90);
        }

        // Render Graphics frame
        function render() {
            // Paint background
            drawRect(0, 0, canvas.width, canvas.height, config.colors.bg);

            drawNet();
            drawHUD();

            // Paint paddles
            drawRect(p1.x, p1.y, p1.width, p1.height, p1.color);
            drawRect(p2.x, p2.y, p2.width, p2.height, p2.color);

            // Paint ball asset
            drawBall(ball.x, ball.y, ball.radius, ball.color, ball.shape);
        }

        // Primary Game Loop
        function gameLoop() {
            if (!gameRunning) return;
            update();
            render();
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
